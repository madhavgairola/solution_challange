<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Deep Spec</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY=" crossorigin="" />
    <script src="https://cdn.jsdelivr.net/npm/@india-boundary-corrector/leaflet-layer/dist/index.global.js"></script>
  </head>
  <body>
    <div id="app"></div>

    <!-- 🧠 TOP BAR (Clock + KPI) -->
    <div id="top-bar-container" style="
      position: fixed;
      top: 16px;
      left: 50%;
      transform: translateX(-50%);
      z-index: 2000;
      display: flex;
      align-items: center;
      gap: 12px;
      pointer-events: none;
    ">
      <!-- Live Clock -->
      <div id="live-clock" class="glass-panel" style="
        padding: 6px 18px;
        display: flex;
        align-items: center;
        gap: 12px;
        border-radius: 999px;
      ">
        <span style="font-size:12px; font-weight:500; color:var(--text-secondary);" id="clock-date"></span>
        <span style="width:4px; height:4px; border-radius:50%; background:var(--accent-glow); display:inline-block;"></span>
        <span style="font-size:14px; font-weight:600; color:var(--text-primary); font-variant-numeric:tabular-nums;" id="clock-time"></span>
      </div>
      
      <!-- KPI Container injected from KPIBar.js -->
      <div id="kpi-mount"></div>
    </div>

    <script>
      (function tickSimClock() {
        const dateEl = document.getElementById('clock-date');
        const timeEl = document.getElementById('clock-time');
        const MONTHS = ['January','February','March','April','May','June',
                        'July','August','September','October','November','December'];
        function update() {
          // Read simulation elapsed days accumulated by the game loop
          const elapsedDays = window.simulationElapsedDays || 0;
          // Convert to ms and add to the real epoch when the sim started
          const startEpoch  = window._simStartEpoch || Date.now();
          const simMs       = elapsedDays * 24 * 60 * 60 * 1000;
          const simNow      = new Date(startEpoch + simMs);

          const d  = simNow.getDate();
          const mo = MONTHS[simNow.getMonth()];
          const y  = simNow.getFullYear();
          const hh = String(simNow.getHours()).padStart(2, '0');
          const mm = String(simNow.getMinutes()).padStart(2, '0');

          if (dateEl) dateEl.textContent = `${d} ${mo} ${y}`;
          if (timeEl) timeEl.textContent = `${hh}:${mm}`;
        }
        update();
        setInterval(update, 500); // refresh every 0.5s for smooth HH:MM ticks
      })();
    </script>

    <script type="module" src="/src/main.js"></script>
  </body>
</html>
